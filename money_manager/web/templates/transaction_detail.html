{% extends "base.html" %}
{% block page_title %}Transaction Detail{% endblock %}

{% block content %}
<section class="form-section">
  <h2>Transaction #{{ tx.id }} ({{ tx.type|capitalize }})</h2>

  <form method="post" class="transaction-form">
    <div>
      <label>Date</label>
      <input type="date" name="date" value="{{ tx.date }}">
    </div>

    <div>
      <label>Category</label>
      <select name="category">
        {% for cat in categories %}
          <option value="{{ cat }}" {% if cat == tx.category %}selected{% endif %}>{{ cat }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label>Sub-category</label>
      <input type="text" name="sub_category" value="{{ tx.sub_category }}">
    </div>

    <div>
      <label>Amount</label>
      <input type="number" step="0.01" name="amount" value="{{ tx.amount }}">
    </div>

    <div>
      <label>Account</label>
      <input type="text" name="account" value="{{ tx.account }}">
    </div>

    <div class="form-field-wide">
      <label>Description</label>
      <textarea name="description" rows="2">{{ tx.description }}</textarea>
    </div>

    <div class="form-actions-row form-field-wide">
      <button type="submit" name="action" value="update">Save changes</button>
      <button type="submit" name="action" value="delete" class="danger-btn">Delete</button>
      <a href="{{ url_for('dashboard.index') }}" class="form-back-link">Back to list</a>
    </div>
  </form>
</section>
{% endblock %}
